name: LKS Desktop Auto Judge (Structure Agnostic)

on:
  push:
  workflow_dispatch:

jobs:
  judge:
    runs-on: windows-latest

    steps:

      #################################
      # OPTIONAL DELAY
      #################################

      - name: Wait 30 minutes before judging
        run: Start-Sleep -Seconds 1800


      #################################
      # CHECKOUT
      #################################

      - name: Checkout repository
        uses: actions/checkout@v4


      #################################
      # INIT SCORE
      #################################

      - name: Initialize score
        shell: pwsh
        run: echo "SCORE=0" >> $env:GITHUB_ENV


      #################################
      # DETECT SOLUTION
      #################################

      - name: Detect Solution File (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.sln) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # BUILD PROJECT
      #################################

      - name: Build Project (+20)
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if ($sln) {
            dotnet build $sln.FullName
            if ($LASTEXITCODE -eq 0) {
              echo "SCORE=$(($env:SCORE+20))" >> $env:GITHUB_ENV
            }
          }


      #################################
      # WINFORMS DETECTION
      #################################

      - name: Detect WinForms Usage (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "System.Windows.Forms" -Quiet) {
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # LOGIN FORM
      #################################

      - name: Detect Login Form (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "login" -Quiet) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # ROLE ACCESS
      #################################

      - name: Detect Role Logic (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "role" -Quiet) {
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # BARANG CRUD
      #################################

      - name: Detect Barang CRUD (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "barang" -Quiet) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # BARANG MASUK
      #################################

      - name: Detect Barang Masuk (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "masuk" -Quiet) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # BARANG KELUAR
      #################################

      - name: Detect Barang Keluar (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "keluar" -Quiet) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # SQL JOIN
      #################################

      - name: Detect SQL JOIN (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "JOIN" -Quiet) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # AGGREGATE QUERY (FIXED)
      #################################

      - name: Detect Aggregate Query (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "SUM\\(" -Quiet) {
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # CHART
      #################################

      - name: Detect Chart Component (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "Chart" -Quiet) {
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # SEARCH
      #################################

      - name: Detect Search Feature (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "search" -Quiet) {
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # FILTER
      #################################

      - name: Detect Filter Feature (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "filter" -Quiet) {
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # EXCEL IMPORT
      #################################

      - name: Detect Excel Import (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String "Excel" -Quiet) {
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # EXPORT SCORE.JSON
      #################################

      - name: Export score.json
        shell: pwsh
        run: |
          mkdir public -ErrorAction SilentlyContinue
          echo "{ ""score"": ""$env:SCORE"" }" > public/score.json


      #################################
      # COMMIT SCORE.JSON
      #################################

      - name: Commit score.json
        shell: pwsh
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/score.json
          git commit -m "update autojudge score" || echo "no changes"
          git push


      #################################
      # SUMMARY
      #################################

      - name: Summary output
        shell: pwsh
        run: |
          echo "## 🏁 Auto Judge Result" >> $env:GITHUB_STEP_SUMMARY
          echo "Final Score: **$env:SCORE / 100**" >> $env:GITHUB_STEP_SUMMARY
