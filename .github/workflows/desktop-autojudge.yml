name: LKS Desktop Auto Judge (Structure Agnostic)

on:
  push:
  workflow_dispatch:

jobs:
  judge:
    runs-on: windows-latest

    steps:

      #################################
      # OPTIONAL DELAY (ANTI CHEAT WINDOW)
      #################################

      - name: Wait 30 minutes before judging
        run: Start-Sleep -Seconds 1800


      #################################
      # CHECKOUT
      #################################

      - name: Checkout repository
        uses: actions/checkout@v4


      #################################
      # INIT SCORE
      #################################

      - name: Initialize score
        shell: pwsh
        run: echo "SCORE=0" >> $env:GITHUB_ENV


      #################################
      # DETECT .NET SOLUTION
      #################################

      - name: Detect Solution File (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.sln) {
            echo "Solution detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # BUILD PROJECT
      #################################

      - name: Build Project (+20)
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if ($sln) {
            dotnet build $sln.FullName
            if ($LASTEXITCODE -eq 0) {
              echo "Build success"
              echo "SCORE=$(($env:SCORE+20))" >> $env:GITHUB_ENV
            }
          }


      #################################
      # DETECT WINFORMS
      #################################

      - name: Detect WinForms Usage (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "System.Windows.Forms" -Quiet) {
            echo "WinForms detected"
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # LOGIN FORM
      #################################

      - name: Detect Login Form (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "login" -Quiet) {
            echo "Login detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # ROLE ACCESS
      #################################

      - name: Detect Role Logic (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "role" -Quiet) {
            echo "Role logic detected"
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # MASTER DATA BARANG
      #################################

      - name: Detect Barang CRUD (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "barang" -Quiet) {
            echo "Barang module detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # BARANG MASUK
      #################################

      - name: Detect Barang Masuk (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "masuk" -Quiet) {
            echo "Barang masuk detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # BARANG KELUAR
      #################################

      - name: Detect Barang Keluar (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "keluar" -Quiet) {
            echo "Barang keluar detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # SQL JOIN
      #################################

      - name: Detect SQL JOIN (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "JOIN" -Quiet) {
            echo "SQL JOIN detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # AGGREGATE QUERY
      #################################

      - name: Detect Aggregate Query (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "SUM(" -Quiet) {
            echo "Aggregate query detected"
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # CHART
      #################################

      - name: Detect Chart Component (+10)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "Chart" -Quiet) {
            echo "Chart detected"
            echo "SCORE=$(($env:SCORE+10))" >> $env:GITHUB_ENV
          }


      #################################
      # SEARCH
      #################################

      - name: Detect Search Feature (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "search" -Quiet) {
            echo "Search detected"
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # FILTER
      #################################

      - name: Detect Filter Feature (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "filter" -Quiet) {
            echo "Filter detected"
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # EXCEL IMPORT
      #################################

      - name: Detect Excel Import (+5)
        shell: pwsh
        run: |
          if (Get-ChildItem -Recurse -Filter *.cs | Select-String -Pattern "Excel" -Quiet) {
            echo "Excel import detected"
            echo "SCORE=$(($env:SCORE+5))" >> $env:GITHUB_ENV
          }


      #################################
      # FINAL SCORE
      #################################

      - name: Print final score
        shell: pwsh
        run: |
          echo "FINAL_SCORE=$env:SCORE"
          echo "Score: $env:SCORE / 100"


      #################################
      # SAVE SCORE FILE
      #################################

      - name: Save score artifact
        shell: pwsh
        run: |
          echo "Score: $env:SCORE / 100" > score.txt


      #################################
      # UPLOAD ARTIFACT
      #################################

      - name: Upload score
        uses: actions/upload-artifact@v4
        with:
          name: autojudge-score
          path: score.txt


      #################################
      # SUMMARY OUTPUT
      #################################

      - name: Summary output
        shell: pwsh
        run: |
          echo "## 🏁 Auto Judge Result" >> $env:GITHUB_STEP_SUMMARY
          echo "Final Score: **$env:SCORE / 100**" >> $env:GITHUB_STEP_SUMMARY
